version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: logistiq_db
    environment:
      POSTGRES_USER: logistiq_user
      POSTGRES_PASSWORD: logistiq_password
      POSTGRES_DB: logistiq
    volumes:
      - ./backend/src/utils/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistiq_user -d logistiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: logistiq_backend
    environment:
      - DATABASE_URL=postgresql://logistiq_user:logistiq_password@db:5432/logistiq
      - NODE_ENV=development
      - PORT=5000
      - JWT_SECRET=supersecret123
      - FRONTEND_URL=http://localhost:8090
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: logistiq_frontend
    ports:
      - "8090:80"
    depends_on:
      - backend

volumes:
  pgdata:
